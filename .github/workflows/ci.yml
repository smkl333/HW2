name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # GitHub Actions will tag the image with your Docker Hub Username
          tags: ${{ secrets.DOCKER_USERNAME }}/math-ocr-api:latest
          # Use Buildx cache to drastically speed up future builds
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/math-ocr-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/math-ocr-api:buildcache,mode=max

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Stop existing container
        run: docker stop math-ocr-api
        continue-on-error: true

      - name: Remove existing container
        run: docker rm math-ocr-api
        continue-on-error: true

      - name: Pull latest image from Docker Hub
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/math-ocr-api:latest

      - name: Run new container
        run: docker run -d -p 8000:8000 --name math-ocr-api ${{ secrets.DOCKER_USERNAME }}/math-ocr-api:latest

      - name: Wait for server to start
        run: sleep 5

      - name: Health check
        run: curl.exe -f http://localhost:8000/health

      - name: Cleanup old images
        run: docker image prune -f
